<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Three.js 第三人称小游戏</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { overflow: hidden; background: #111; font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
canvas { display: block; }

/* ---- 开始遮罩 ---- */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.85);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; transition: opacity .4s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay h1 {
  font-size: 36px; font-weight: 900;
  background: linear-gradient(135deg, #00d2ff, #7b2ff7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 20px;
}
.overlay p { color: #888; font-size: 16px; margin-bottom: 8px; }
.overlay .start-hint {
  margin-top: 32px; padding: 14px 36px; border-radius: 12px;
  border: 2px solid #7b2ff7; color: #c8b0ff; font-size: 18px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.04); }
}

/* ---- HUD ---- */
.hud {
  position: fixed; z-index: 50; pointer-events: none;
  color: #fff; font-size: 13px;
}
.hud-controls {
  left: 20px; bottom: 20px;
  background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
  border: 1px solid rgba(123,47,247,.3); border-radius: 10px;
  padding: 12px 16px; line-height: 1.8;
}
.hud-controls kbd {
  display: inline-block; padding: 1px 7px; border-radius: 4px;
  background: rgba(123,47,247,.2); border: 1px solid rgba(123,47,247,.4);
  color: #c8b0ff; font-size: 12px; font-family: inherit; margin-right: 2px;
}
.hud-pos {
  right: 20px; top: 20px;
  background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
  border: 1px solid rgba(123,47,247,.3); border-radius: 10px;
  padding: 10px 16px; font-size: 12px; color: #aaa;
}
.hud-pos span { color: #00d2ff; font-weight: 600; }
.hud-ammo {
  right: 20px; bottom: 20px;
  background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,107,107,.3); border-radius: 10px;
  padding: 10px 18px; font-size: 18px; color: #ff6b6b; font-weight: 700;
}
.hud-ammo .ammo-num { font-size: 24px; color: #fff; }
.hud-hit {
  position: fixed; top: 50%; left: 50%; z-index: 60;
  transform: translate(-50%,-50%); pointer-events: none;
  font-size: 28px; color: #ff4444; font-weight: 900;
  opacity: 0; transition: opacity .1s;
}

/* ---- 十字准心 ---- */
.crosshair {
  position: fixed; top: 50%; left: 50%; z-index: 50;
  width: 24px; height: 24px; transform: translate(-50%, -50%);
  pointer-events: none; opacity: 0;
}
.crosshair::before, .crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,.7);
}
.crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
.crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
.crosshair .dot {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 4px; height: 4px; border-radius: 50%; background: #ff4444;
}
</style>
</head>
<body>

<!-- 开始遮罩 -->
<div class="overlay" id="overlay">
  <h1>Three.js 小世界</h1>
  <p id="controlHint">WASD 移动 | 空格跳跃 | 鼠标控制视角</p>
  <p id="controlHint2">鼠标左键射击 | 滚轮缩放</p>
  <div class="start-hint">点击开始</div>
</div>

<!-- HUD -->
<div class="hud hud-controls" id="hud" style="opacity:0;transition:opacity .4s">
  <div><kbd>W</kbd> 前进 &nbsp; <kbd>S</kbd> 后退</div>
  <div><kbd>A</kbd> 左移 &nbsp; <kbd>D</kbd> 右移</div>
  <div><kbd>Space</kbd> 跳跃 &nbsp; <kbd>滚轮</kbd> 缩放</div>
  <div><kbd>左键</kbd> 射击</div>
  <div style="color:#555;font-size:11px;margin-top:6px">ESC 释放鼠标</div>
</div>
<div class="hud hud-pos" id="hudPos" style="opacity:0;transition:opacity .4s">
  位置: X <span id="posX">0</span> &nbsp; Z <span id="posZ">0</span>
</div>
<div class="hud hud-ammo" id="hudAmmo" style="opacity:0;transition:opacity .4s">
  弹药 <span class="ammo-num">∞</span> 无限
</div>
<div class="hud" id="hudHP" style="opacity:0;transition:opacity .4s;left:50%;top:16px;transform:translateX(-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border:1px solid rgba(74,222,128,.3);border-radius:10px;padding:8px 16px;text-align:center;pointer-events:none">
  <div style="font-size:11px;color:#888;margin-bottom:4px">生命值</div>
  <div style="width:200px;height:12px;background:#222;border-radius:6px;overflow:hidden">
    <div id="hpBar" style="width:100%;height:100%;background:#4ade80;border-radius:6px;transition:width .2s,background .3s"></div>
  </div>
  <div style="font-size:12px;color:#ccc;margin-top:4px"><span id="hpText">100</span> / 100</div>
</div>
<div class="hud-hit" id="hudHit">+10</div>
<div class="hud" id="hudPowerUp" style="opacity:0;transition:opacity .4s;left:50%;bottom:60px;transform:translateX(-50%);background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:10px;padding:6px 16px;text-align:center;pointer-events:none;font-size:13px;font-weight:600"></div>
<!-- 受击红闪效果 -->
<div id="damageOverlay" style="position:fixed;inset:0;pointer-events:none;z-index:50;background:radial-gradient(ellipse at center,transparent 30%,rgba(180,0,0,.6) 100%);opacity:0;transition:opacity .15s"></div>
<div id="autoFireIndicator" style="position:fixed;top:50%;right:20px;transform:translateY(-50%);pointer-events:none;z-index:40;opacity:0;transition:opacity .3s;font-size:14px;font-weight:700;color:#0f0;text-shadow:0 0 8px #0f0">AUTO FIRE</div>
<div id="scoreIndicator" style="position:fixed;top:16px;left:20px;pointer-events:none;z-index:60;font-size:15px;font-weight:700;color:#fff;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);border-radius:8px;padding:4px 12px;text-shadow:0 0 8px rgba(255,255,255,.5);opacity:0;transition:opacity .5s">0</div>
<div id="remainIndicator" style="position:fixed;top:50px;left:20px;pointer-events:none;z-index:60;font-size:13px;font-weight:600;color:#ccc;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border-radius:8px;padding:4px 12px;opacity:0;transition:opacity .5s">剩余: 0</div>
<div id="levelIndicator" style="position:fixed;top:70px;right:20px;pointer-events:none;z-index:60;font-size:18px;font-weight:700;color:#ffaa00;text-shadow:0 0 10px rgba(255,165,0,.9),0 0 20px rgba(255,100,0,.5);opacity:0;transition:opacity .5s">LEVEL 1</div>
<!-- 移动端虚拟控制 -->
<div id="mobileControls" style="display:none;position:fixed;inset:0;z-index:80;pointer-events:none">
  <!-- 左侧虚拟摇杆 -->
  <canvas id="joystickCanvas" style="position:fixed;bottom:30px;left:30px;width:140px;height:140px;pointer-events:auto;touch-action:none"></canvas>
  <!-- 右侧视角触控区 -->
  <div id="lookArea" style="position:fixed;top:0;right:0;width:50%;height:65%;pointer-events:auto;touch-action:none"></div>
  <!-- 射击按钮 -->
  <div id="fireBtn" style="position:fixed;bottom:60px;right:40px;width:70px;height:70px;border-radius:50%;background:rgba(255,60,60,.5);border:2px solid rgba(255,100,100,.7);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;pointer-events:auto;touch-action:none;user-select:none">FIRE</div>
  <!-- 跳跃按钮 -->
  <div id="jumpBtn" style="position:fixed;bottom:150px;right:50px;width:56px;height:56px;border-radius:50%;background:rgba(100,100,255,.4);border:2px solid rgba(130,130,255,.6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;pointer-events:auto;touch-action:none;user-select:none">JUMP</div>
  <!-- 自动开火按钮 -->
  <div id="autoFireBtn" style="position:fixed;bottom:60px;right:130px;width:50px;height:50px;border-radius:25px;background:rgba(0,80,0,.4);border:2px solid rgba(0,180,0,.5);display:flex;align-items:center;justify-content:center;color:#aaa;font-size:10px;font-weight:700;pointer-events:auto;touch-action:none;user-select:none">AUTO</div>
  <!-- 缩放按钮 -->
  <div id="zoomInBtn" style="position:fixed;top:50%;right:15px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;pointer-events:auto;touch-action:none;user-select:none;line-height:1">+</div>
  <div id="zoomOutBtn" style="position:fixed;top:calc(50% + 44px);right:15px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;pointer-events:auto;touch-action:none;user-select:none;line-height:1">-</div>
</div>
<div class="crosshair" id="crosshair">
  <div class="dot"></div>
</div>

<!-- Three.js（全局加载，无需服务器） -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>

/* ============================================
   全局变量
   ============================================ */
let scene, camera, renderer;
let playerGroup;
let clock;
let isLocked = false;
let isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
let mobileFiring = false;  // 手机射击状态
let sun;

if (isMobile) {
  document.getElementById('controlHint').textContent = '左侧摇杆移动 | 右侧滑动视角';
  document.getElementById('controlHint2').textContent = 'FIRE按钮射击 | 支持触屏操作';
}

// 输入状态
const keys = { w: false, a: false, s: false, d: false, space: false };
let mouseDown = false;
let autoFire = false; // 滚轮锁定的自动开火状态
const velocity = new THREE.Vector3();
let verticalVelocity = 0;
let canJump = true;
const GRAVITY = -25;
const JUMP_FORCE = 10;
const MOVE_SPEED = 8;
const PLAYER_RADIUS = 0.4; // 玩家碰撞半径

// 鼠标视角
let yaw = 0;
let pitch = 0;
let cameraDistance = 6;
const MIN_DISTANCE = 2.5;
const MAX_DISTANCE = 15;
const GROUND_MIN_HEIGHT = 0.5;
const CAMERA_HEIGHT_OFFSET = 2;

const MOUSE_SENSITIVITY_YAW = 0.0012;
const MOUSE_SENSITIVITY_PITCH = 0.0012;
const INVERT_PITCH = true;

// 碰撞体列表
let colliders = []; // {x, z, radius}
let floorMesh;

// 枪械
let gunGroup;
let muzzlePoint;

// 子弹系统
const bullets = [];
const BULLET_SPEED = 120;
const BULLET_MAX_DIST = 120;
const FIRE_RATE = 0.08;
let fireTimer = 0;

// 射击命中标记
const hitMarkers = [];

// 枪械后坐力动画变量
let gunRecoilZ = 0;

// 枪口闪光计时器
let muzzleFlashTimer = 0;

// 预创建共享几何体/材质（避免每发子弹 new）
let sharedCoreGeo, sharedGlowGeo, sharedTailGeo, sharedTail2Geo;
let sharedCoreMat, sharedGlowMat, sharedTailMat, sharedTail2Mat;

// 临时向量（避免每帧 clone 和 new）
const _tmpVec = new THREE.Vector3();
const _tmpVec2 = new THREE.Vector3();
const _tmpVec3 = new THREE.Vector3(0, 1, 0); // up 向量
const _originVec = new THREE.Vector3(0, 0, 0); // lookAt 的 eye 原点（固定不变）
const _prevPos = new THREE.Vector3(); // 子弹上一帧位置
const _tmpVec4 = new THREE.Vector3(); // 通用临时向量
const _tmpMat4 = new THREE.Matrix4();
const _tmpQuat = new THREE.Quaternion();

function initSharedBulletAssets() {
  sharedCoreGeo = new THREE.SphereGeometry(0.05, 6, 6);
  sharedGlowGeo = new THREE.SphereGeometry(0.1, 6, 6);
  sharedTailGeo = new THREE.CylinderGeometry(0.03, 0.005, 2.5, 6);
  sharedTail2Geo = new THREE.CylinderGeometry(0.015, 0.003, 1.8, 4);

  // 蓝白合金弹头风格
  sharedCoreMat = new THREE.MeshBasicMaterial({ color: 0xffffff });       // 纯白核心
  sharedGlowMat = new THREE.MeshBasicMaterial({ color: 0x33ccff, transparent: true, opacity: 0.5 }); // 青蓝光晕
  sharedTailMat = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.85 }); // 蓝色主拖尾
  sharedTail2Mat = new THREE.MeshBasicMaterial({ color: 0x66ddff, transparent: true, opacity: 0.5 }); // 浅蓝外拖尾
}

// 怪物系统
const monsters = [];
let currentLevel = 1;
let bossMaxForLevel = 1;
let maxSmallForLevel = 70; // 40 + 1*30
let maxMonsters = 71; // bossMaxForLevel + maxSmallForLevel
let levelTransition = false; // 过关动画中
let levelTransTimer = 0;
let bossesKilledThisLevel = 0;
let bossesTotalThisLevel = 0;
let smallTotalThisLevel = 0;   // 本关已刷出的小僵尸数
let smallKilledThisLevel = 0;  // 本关已击杀的小僵尸数
const MONSTER_SPEED = 1.17;
const MONSTER_HP = 300;
const MONSTER_DAMAGE = 5;
const MONSTER_ATTACK_RANGE = 1.8;
const MONSTER_ATTACK_COOLDOWN = 1.0;
let spawnTimer = 0;
const SPAWN_INTERVAL = 0.5; // 每0.5秒刷一只（开始略慢，上限更高）

// 道具系统
const pickups = [];
let bulletCount = 1;           // 当前弹道数
let bulletSpread = 0;         // 扇形半角（弧度）
let firerateMul = 1.0;       // 攻速倍率（永久累积，拾取绿色道具时乘以 0.7）
const MAX_BULLET_COUNT = 9;   // 弹道叠加上限
let pickupSpawnTimer = 0;
const PICKUP_SPAWN_INTERVAL = 12;
const MAX_PICKUPS = 3;

// 玩家血量
let playerHP = 100;
const MAX_HP = 100;
let playerDead = false;
let playerDying = false;    // 玩家正在播放死亡动画
let deathAnimTimer = 0;     // 死亡动画计时
let deathExploded = false;  // 是否已触发爆炸
let score = 0;              // 累计积分
const SMALL_KILL_SCORE = 100;  // 小僵尸击杀积分
const BOSS_KILL_SCORE = 500;   // Boss击杀积分

// 屏幕震动
let shakeIntensity = 0;
let shakeDuration = 0;

// 脚步声计时
let footstepTimer = 0;
const FOOTSTEP_INTERVAL = 0.35;

// 受击效果计时
let damageFlashTimer = 0;

/* ============================================
   Web Audio 音效系统（预生成缓冲区，避免射击时实时创建）
   ============================================ */
let audioCtx = null;
let gunshotNoiseBuffer = null;

function initAudio() {
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // 预生成枪声噪声缓冲区（只创建一次）
    const bufferSize = Math.floor(audioCtx.sampleRate * 0.08);
    gunshotNoiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = gunshotNoiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 8);
    }
  } catch(e) {
    console.warn('音频初始化失败:', e);
  }
}

function playGunshot() {
  try {
    if (!audioCtx || !gunshotNoiseBuffer) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;

    // 复用预生成噪声缓冲区
    const noise = audioCtx.createBufferSource();
    noise.buffer = gunshotNoiseBuffer;

    // 低频"砰"（振荡器）
    const osc = audioCtx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.1);

    // 增益包络
    const gainNoise = audioCtx.createGain();
    gainNoise.gain.setValueAtTime(0.4, t);
    gainNoise.gain.exponentialRampToValueAtTime(0.001, t + 0.08);

    const gainOsc = audioCtx.createGain();
    gainOsc.gain.setValueAtTime(0.3, t);
    gainOsc.gain.exponentialRampToValueAtTime(0.001, t + 0.12);

    // 带通滤波让噪声更像枪声
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 2000;
    filter.Q.value = 0.8;

    noise.connect(filter).connect(gainNoise).connect(audioCtx.destination);
    osc.connect(gainOsc).connect(audioCtx.destination);

    noise.start(t);
    noise.stop(t + 0.1);
    osc.start(t);
    osc.stop(t + 0.15);

    // 自动清理已停止的节点（避免内存泄漏）
    noise.onended = () => { filter.disconnect(); gainNoise.disconnect(); };
    osc.onended = () => { gainOsc.disconnect(); };
  } catch (e) {
    console.error('枪声音频错误:', e);
  }
}

function playHitSound() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t = audioCtx.currentTime;

  // 短促的"噗"声
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(400, t);
  osc.frequency.exponentialRampToValueAtTime(100, t + 0.08);

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);

  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.1);
}

function playKillSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  // 双音"叮-嗡"
  const osc1 = audioCtx.createOscillator();
  osc1.type = 'sine';
  osc1.frequency.setValueAtTime(800, t);
  osc1.frequency.exponentialRampToValueAtTime(200, t + 0.25);

  const osc2 = audioCtx.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(1200, t);
  osc2.frequency.exponentialRampToValueAtTime(300, t + 0.2);

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.2, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);

  osc1.connect(gain).connect(audioCtx.destination);
  osc2.connect(gain).connect(audioCtx.destination);
  osc1.start(t); osc1.stop(t + 0.3);
  osc2.start(t); osc2.stop(t + 0.25);
}

function playFootstep() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;

  const bufferSize = audioCtx.sampleRate * 0.05;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 12);
  }
  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 600 + Math.random() * 200;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.08, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);

  noise.connect(filter).connect(gain).connect(audioCtx.destination);
  noise.start(t);
  noise.stop(t + 0.06);
}

function playDamageSound() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t = audioCtx.currentTime;

  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(200, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.15);

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);

  osc.connect(gain).connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.2);
}

function playZombieGroan(distance) {
  if (!audioCtx) return;
  // 确保音频上下文未挂起
  if (audioCtx.state === 'suspended') audioCtx.resume();
  try {
    const t = audioCtx.currentTime;
    // 音量随距离衰减（增大基础音量）
    const vol = Math.max(0.05, 0.25 * (1 - distance / 35));

    // 低频呻吟（两个振荡器叠加，频率微有偏差产生颤音）
    const osc1 = audioCtx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(70 + Math.random() * 30, t);
    osc1.frequency.linearRampToValueAtTime(50 + Math.random() * 20, t + 0.8);

    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(140 + Math.random() * 40, t);
    osc2.frequency.linearRampToValueAtTime(100 + Math.random() * 20, t + 0.8);

    // 低通滤波让声音更闷
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 400;
    filter.Q.value = 1;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.1);
    gain.gain.linearRampToValueAtTime(vol * 0.7, t + 0.5);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.9);

    osc1.connect(filter).connect(gain).connect(audioCtx.destination);
    osc2.connect(gain);

    osc1.start(t); osc1.stop(t + 0.9);
    osc2.start(t); osc2.stop(t + 0.9);

    osc1.onended = () => { filter.disconnect(); gain.disconnect(); };
  } catch(e) { console.error('僵尸音效错误:', e); }
}

function triggerShake(intensity, duration) {

function explodeAOE(center, radius) {
  let killedCount = 0;
  for (let m = monsters.length - 1; m >= 0; m--) {
    const mon = monsters[m];
    if (mon.dead) continue;
    const dx = mon.group.position.x - center.x;
    const dz = mon.group.position.z - center.z;
    if (dx * dx + dz * dz < radius * radius) {
      mon.hp = 0;
      killMonster(mon);
      killedCount++;
    }
  }
  return killedCount;
}

function createExplosionEffect(pos) {
  // 大粒子爆炸
  for (let i = 0; i < 30; i++) {

    p.mat.color.setHex(Math.random() > 0.5 ? 0xffaa00 : 0xff4400);
    p.mesh.position.copy(pos);

    _tmpVec4.set(Math.cos(angle) * speed, Math.random() * 8, Math.sin(angle) * speed);
    hitMarkers.push({
      particle: p,
      velocity: _tmpVec4.clone(),
      life: 1.0,
      maxLife: 1.0
    });
  }
  // 冲击波环
  const ringGeo = new THREE.RingGeometry(0.1, 0.5, 24);
  const ringMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos);
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);

  // 用 animate 中的 simpleMeshes 数组来管理这个环（如果存在的话）

  let ringScale = 1;
  const ringAnim = setInterval(() => {

    if (ringMat.opacity <= 0) {
      scene.remove(ring);
      ringGeo.dispose();
      ringMat.dispose();
      clearInterval(ringAnim);
    }
  }, 30);
}

function createFloor() {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#4a7c3f';
  ctx.fillRect(0, 0, 512, 512);
  const tileSize = 64;
  for (let y = 0; y < 512; y += tileSize) {
    for (let x = 0; x < 512; x += tileSize) {
      const shade = (Math.random() - 0.5) * 12;
      const r = 74 + shade, g = 124 + shade, b = 63 + shade;
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.fillRect(x + 1, y + 1, tileSize - 2, tileSize - 2);
    }
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping;
  texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(200, 200);

  const geo = new THREE.PlaneGeometry(2000, 2000);
  const mat = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.9 });
  floorMesh = new THREE.Mesh(geo, mat);
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.receiveShadow = true;
  scene.add(floorMesh);
}

/* ============================================
   场景装饰（含碰撞体注册）
   ============================================ */
/* ============================================
   无限地图：区块系统
   ============================================ */
const CHUNK_SIZE = 40;       // 每个区块 40x40 单位
const CHUNK_RANGE = 2;       // 玩家周围 2 格半径 = 5x5 个区块
const activeChunks = new Map(); // key: "cx,cz" -> { meshes, colliders }

// 确定性随机（同坐标同结果）
function hashRand(x, z, seed) {
  let h = (x * 374761393 + z * 668265263 + seed * 2147483647) | 0;
  h = (h ^ (h >> 13)) * 1274126177;
  return ((h ^ (h >> 16)) >>> 0) / 4294967295;
}

function getChunkKey(cx, cz) { return cx + ',' + cz; }

function createEnvironment() {
  // 天空盒
  const skyGeo = new THREE.SphereGeometry(300, 32, 16);
  const skyMat = new THREE.MeshBasicMaterial({ color: 0x87ceeb, side: THREE.BackSide });
  scene.add(new THREE.Mesh(skyGeo, skyMat));
  // 初始加载玩家所在区块
  updateChunks();
}

function updateChunks() {
  const pcx = Math.floor(playerGroup.position.x / CHUNK_SIZE);
  const pcz = Math.floor(playerGroup.position.z / CHUNK_SIZE);

  // 加载新区块
  for (let dx = -CHUNK_RANGE; dx <= CHUNK_RANGE; dx++) {
    for (let dz = -CHUNK_RANGE; dz <= CHUNK_RANGE; dz++) {
      const cx = pcx + dx, cz = pcz + dz;
      const key = getChunkKey(cx, cz);
      if (!activeChunks.has(key)) {
        const chunk = generateChunk(cx, cz);
        activeChunks.set(key, chunk);
      }
    }
  }

  // 卸载远区块
  for (const [key, chunk] of activeChunks) {
    const [cx, cz] = key.split(',').map(Number);
    if (Math.abs(cx - pcx) > CHUNK_RANGE + 1 || Math.abs(cz - pcz) > CHUNK_RANGE + 1) {
      for (const m of chunk.meshes) scene.remove(m);
      chunk.meshes.forEach(m => {
        m.traverse(c => {
          if (c.geometry) c.geometry.dispose();
          if (c.material) c.material.dispose();
        });
      });
      // 从 colliders 中移除该区块的碰撞体
      chunk.colliderIndices.forEach(idx => { colliders[idx] = null; });
      activeChunks.delete(key);
    }
  }
  // 清理 colliders 数组中的 null
  for (let i = colliders.length - 1; i >= 0; i--) {
    if (colliders[i] === null) colliders.splice(i, 1);
  }
}

function generateChunk(cx, cz) {
  const meshes = [];
  const colliderIndices = [];
  const baseX = cx * CHUNK_SIZE, baseZ = cz * CHUNK_SIZE;

  // 每区块根据确定性随机生成内容
  for (let i = 0; i < 6; i++) {
    const rx = hashRand(cx, cz, i * 7 + 1) * CHUNK_SIZE + baseX;
    const rz = hashRand(cx, cz, i * 13 + 3) * CHUNK_SIZE + baseZ;
    const typeRoll = hashRand(cx, cz, i * 17 + 5);

    let mesh = null, colliderR = 0;

    if (typeRoll < 0.35) {
      // 树
      mesh = createTreeMesh(rx, rz, hashRand(cx, cz, i * 19 + 7));
      colliderR = mesh.userData.colliderR;
    } else if (typeRoll < 0.55) {
      // 石头
      const s = 0.3 + hashRand(cx, cz, i * 23 + 11) * 0.6;
      mesh = createRockMesh(rx, rz, s);
      colliderR = s * 0.7;
    } else if (typeRoll < 0.70) {
      // 灌木丛
      mesh = createBushMesh(rx, rz);
      colliderR = 0.3;
    } else if (typeRoll < 0.82) {
      // 枯木
      mesh = createDeadTreeMesh(rx, rz);
      colliderR = 0.25;
    } else if (typeRoll < 0.92) {
      // 草丛
      mesh = createGrassMesh(rx, rz);
      colliderR = 0; // 草没有碰撞
    } else {
      // 花
      mesh = createFlowerMesh(rx, rz);
      colliderR = 0;
    }

    if (mesh) {
      scene.add(mesh);
      meshes.push(mesh);
    }
    if (colliderR > 0) {
      colliderIndices.push(colliders.length);
      colliders.push({ x: rx, z: rz, radius: colliderR });
    }
  }

  return { meshes, colliderIndices };
}

function createTreeMesh(x, z, seed) {
  const group = new THREE.Group();
  const trunkH = 1.8 + seed * 1.2;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.15, 0.22, trunkH, 8),
    new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 })
  );
  trunk.position.y = trunkH / 2;
  trunk.castShadow = true;
  group.add(trunk);

  const leafColor = new THREE.Color().setHSL(0.28 + seed * 0.08, 0.6, 0.3 + seed * 0.15);
  for (let i = 0; i < 3; i++) {
    const r = 0.8 + seed * 0.6 - i * 0.15;
    const leaf = new THREE.Mesh(
      new THREE.SphereGeometry(r, 8, 8),
      new THREE.MeshStandardMaterial({ color: leafColor, roughness: 0.8 })
    );
    leaf.position.y = trunkH + 0.4 + i * 0.6;
    leaf.position.x = (seed - 0.5) * 0.3;
    leaf.position.z = (seed - 0.5) * 0.3;
    leaf.castShadow = true;
    group.add(leaf);
  }
  const scale = 0.8 + seed * 0.8;
  group.scale.setScalar(scale);
  group.position.set(x, 0, z);
  group.userData.colliderR = 0.2 * scale + 0.3;
  return group;
}

function createRockMesh(x, z, s) {
  const rock = new THREE.Mesh(
    new THREE.DodecahedronGeometry(s, 1),
    new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.95 })

  rock.position.set(x, s * 0.4, z);
  rock.rotation.set(Math.random(), Math.random(), Math.random());
  rock.castShadow = true;
  rock.receiveShadow = true;
  return rock;
}

}

    branch.position.y = 1.5 + i * 0.5;

function createGrassMesh(x, z) {
  const group = new THREE.Group();
  const grassColor = new THREE.Color().setHSL(0.25, 0.5, 0.35 + Math.random() * 0.1);
  for (let i = 0; i < 5; i++) {

function createFlowerMesh(x, z) {
  const group = new THREE.Group();
  const stem = new THREE.Mesh(

  const bloom = new THREE.Mesh(

    new THREE.MeshStandardMaterial({ color: bloomColor, emissive: bloomColor, emissiveIntensity: 0.2 })
  );
  bloom.position.y = 0.42;
  group.add(bloom);
  group.position.set(x, 0, z);
  return group;
}

/* ============================================
   碰撞检测：圆-圆
   ============================================ */
function resolveCollisions() {
  const px = playerGroup.position.x;
  const pz = playerGroup.position.z;

  for (const c of colliders) {
    const dx = px - c.x;
    const dz = pz - c.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const minDist = PLAYER_RADIUS + c.radius;

    if (dist < minDist && dist > 0.0001) {
      // 把玩家推出去
      const push = (minDist - dist) / dist;
      playerGroup.position.x += dx * push;
      playerGroup.position.z += dz * push;
    }
  }
}

/* ============================================
   输入处理
   ============================================ */
function onKeyDown(e) {
  switch (e.code) {
    case 'KeyW': keys.w = true; break;
    case 'KeyA': keys.a = true; break;
    case 'KeyS': keys.s = true; break;
    case 'KeyD': keys.d = true; break;
    case 'Space': keys.space = true; e.preventDefault(); break;
  }
}

function onKeyUp(e) {
  switch (e.code) {
    case 'KeyW': keys.w = false; break;
    case 'KeyA': keys.a = false; break;
    case 'KeyS': keys.s = false; break;
    case 'KeyD': keys.d = false; break;
    case 'Space': keys.space = false; break;
  }
}

function onMouseMove(e) {
  if (!isLocked) return;
  yaw -= e.movementX * MOUSE_SENSITIVITY_YAW;
  if (INVERT_PITCH) {
    pitch += e.movementY * MOUSE_SENSITIVITY_PITCH;
  } else {
    pitch -= e.movementY * MOUSE_SENSITIVITY_PITCH;
  }
  pitch = Math.max(-0.2, Math.min(Math.PI / 3, pitch));
}

/* ============================================
   移动端触控系统
   ============================================ */
const joystickState = { active: false, touchId: null, baseX: 0, baseY: 0, dx: 0, dy: 0 };
const lookState = { active: false, touchId: null, lastX: 0, lastY: 0 };
const pinchState = { active: false, dist: 0 };

function initMobileControls() {
  if (!isMobile) return;
  document.getElementById('mobileControls').style.display = 'block';
  
  // 隐藏PC操作提示
  const hud = document.getElementById('hud');
  if (hud) hud.style.display = 'none';
  
  // 不使用 pointer lock
  isLocked = true;
  
  const joystickCanvas = document.getElementById('joystickCanvas');
  const lookArea = document.getElementById('lookArea');
  const fireBtn = document.getElementById('fireBtn');
  const jumpBtn = document.getElementById('jumpBtn');
  const autoFireBtn = document.getElementById('autoFireBtn');
  
  // 设置 canvas 分辨率
  const dpr = window.devicePixelRatio || 1;
  joystickCanvas.width = 140 * dpr;
  joystickCanvas.height = 140 * dpr;
  const jCtx = joystickCanvas.getContext('2d');
  jCtx.scale(dpr, dpr);
  
  // 绘制摇杆
  function drawJoystick() {
    jCtx.clearRect(0, 0, 140, 140);
    // 底盘
    jCtx.beginPath();
    jCtx.arc(70, 70, 55, 0, Math.PI * 2);
    jCtx.fillStyle = 'rgba(255,255,255,0.12)';
    jCtx.fill();
    jCtx.strokeStyle = 'rgba(255,255,255,0.25)';
    jCtx.lineWidth = 2;
    jCtx.stroke();
    // 摇杆头
    const knobX = 70 + joystickState.dx * 50;
    const knobY = 70 + joystickState.dy * 50;
    jCtx.beginPath();
    jCtx.arc(knobX, knobY, 22, 0, Math.PI * 2);
    jCtx.fillStyle = joystickState.active ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.2)';
    jCtx.fill();
  }
  
  // 更新 WASD keys 基于摇杆输入（在 animate 中调用）
  window._updateJoystickKeys = function() {
    if (!joystickState.active) {
      keys.w = false; keys.s = false; keys.a = false; keys.d = false;
      return;
    }
    const deadzone = 0.15;
    const dx = joystickState.dx;
    const dy = joystickState.dy;
    keys.w = dy < -deadzone;
    keys.s = dy > deadzone;
    keys.a = dx < -deadzone;
    keys.d = dx > deadzone;
  };
  
  // 摇杆 touch 事件
  joystickCanvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (joystickState.active) return;
    const t = e.changedTouches[0];
    joystickState.active = true;
    joystickState.touchId = t.identifier;
    const rect = joystickCanvas.getBoundingClientRect();
    joystickState.baseX = rect.left + rect.width / 2;
    joystickState.baseY = rect.top + rect.height / 2;
    drawJoystick();
  }, { passive: false });
  
  joystickCanvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      if (t.identifier === joystickState.touchId) {
        const maxDist = 50;
        let dx = (t.clientX - joystickState.baseX) / maxDist;
        let dy = (t.clientY - joystickState.baseY) / maxDist;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > 1) { dx /= dist; dy /= dist; }
        joystickState.dx = dx;
        joystickState.dy = dy;
        drawJoystick();
      }
    }
  }, { passive: false });
  
  function resetJoystick() {
    joystickState.active = false;
    joystickState.touchId = null;
    joystickState.dx = 0;
    joystickState.dy = 0;
    drawJoystick();
  }
  
  joystickCanvas.addEventListener('touchend', function(e) {
    for (let i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === joystickState.touchId) resetJoystick();
    }
  });
  joystickCanvas.addEventListener('touchcancel', resetJoystick);
  
  // 视角触控（单指纯视角，无缩放）
  lookArea.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (lookState.active) return;
    const t = e.changedTouches[0];
    lookState.active = true;
    lookState.touchId = t.identifier;
    lookState.lastX = t.clientX;
    lookState.lastY = t.clientY;
  }, { passive: false });
  
  lookArea.addEventListener('touchmove', function(e) {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      if (t.identifier === lookState.touchId) {
        const dx = t.clientX - lookState.lastX;
        const dy = t.clientY - lookState.lastY;
        yaw -= dx * 0.008;          // 灵敏度翻倍
        pitch += dy * 0.008;         // 反转：上滑看脚下，下滑看头顶
        pitch = Math.max(-Math.PI / 2.5, Math.min(Math.PI / 2.5, pitch)); // 扩大角度范围
        lookState.lastX = t.clientX;
        lookState.lastY = t.clientY;
      }
    }
  }, { passive: false });
  
  function resetLook() {
    lookState.active = false;
    lookState.touchId = null;
  }
  lookArea.addEventListener('touchend', function(e) {
    for (let i = 0; i < e.changedTouches.length; i++) {
      if (e.changedTouches[i].identifier === lookState.touchId) resetLook();
    }
  });
  lookArea.addEventListener('touchcancel', resetLook);
  
  // 射击按钮
  fireBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    mobileFiring = true;
    mouseDown = true;
  }, { passive: false });
  fireBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    mobileFiring = false;
    if (!autoFire) mouseDown = false;
  });
  fireBtn.addEventListener('touchcancel', function() {
    mobileFiring = false;
    if (!autoFire) mouseDown = false;
  });
  
  // 跳跃按钮
  jumpBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    keys.space = true;
  }, { passive: false });
  jumpBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    keys.space = false;
  });
  jumpBtn.addEventListener('touchcancel', function() { keys.space = false; });
  
  // 自动开火按钮
  autoFireBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    autoFire = !autoFire;
    autoFireBtn.style.background = autoFire ? 'rgba(0,180,0,.5)' : 'rgba(0,80,0,.4)';
    autoFireBtn.style.color = autoFire ? '#0f0' : '#aaa';
    document.getElementById('autoFireIndicator').style.opacity = autoFire ? '1' : '0';
    if (autoFire) { mouseDown = true; }
    else { mouseDown = mobileFiring; }
  }, { passive: false });
  
  // 缩放按钮
  const zoomInBtn = document.getElementById('zoomInBtn');
  const zoomOutBtn = document.getElementById('zoomOutBtn');
  zoomInBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    cameraDistance = Math.max(MIN_DISTANCE, cameraDistance - 2);
  }, { passive: false });
  zoomOutBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    cameraDistance = Math.min(MAX_DISTANCE, cameraDistance + 2);
  }, { passive: false });
  
  // 阻止默认触摸行为（防止页面滚动等）
  document.addEventListener('touchmove', function(e) {
    if (isMobile && isLocked) e.preventDefault();
  }, { passive: false });
  
  drawJoystick();
}

// 防止双击缩放
document.addEventListener('dblclick', function(e) { if (isMobile) e.preventDefault(); });

function onWheel(e) {
  if (!isLocked) return;
  cameraDistance += e.deltaY * 0.005;
  cameraDistance = Math.max(MIN_DISTANCE, Math.min(MAX_DISTANCE, cameraDistance));
  e.preventDefault();
}

function onMouseDown(e) {
  if (!isLocked) return;
  if (e.button === 0) mouseDown = true;
  if (e.button === 1) {
    // 中键（滚轮按下）切换自动开火
    autoFire = !autoFire;
    document.getElementById('autoFireIndicator').style.opacity = autoFire ? '1' : '0';
    mouseDown = autoFire; // 锁定=开火，解锁=停火
    e.preventDefault();
  }
}

function onMouseUp(e) {
  if (e.button === 0) {
    mouseDown = autoFire; // 如果自动开火开启中，松开鼠标不停火
  }
}

function onPointerLockChange() {
  if (isMobile) return;
  isLocked = document.pointerLockElement === renderer.domElement;
  if (!isLocked) {
    mouseDown = false;
    autoFire = false;
    document.getElementById('autoFireIndicator').style.opacity = '0';
  }
}

function startGame() {
  playerDead = false;
  playerDying = false;
  deathAnimTimer = 0;
  deathExploded = false;
  smallKilledThisLevel = 0;
  smallTotalThisLevel = 0;
  document.getElementById('overlay').classList.add('hidden');
  // 移动端不需要 pointer lock
  if (!isMobile) {
    try {
      renderer.domElement.requestPointerLock();
    } catch(e) {
      console.warn('PointerLock 请求被拒绝，游戏仍可继续:', e);
    }
  } else {
    initMobileControls();
  }
  document.getElementById('hud').style.opacity = '1';
  document.getElementById('hudPos').style.opacity = '1';
  document.getElementById('hudAmmo').style.opacity = '1';
  document.getElementById('hudHP').style.opacity = '1';
  document.getElementById('crosshair').style.opacity = '0.8';
  document.getElementById('levelIndicator').textContent = 'LEVEL 1';
  document.getElementById('levelIndicator').style.opacity = '1';
  score = 0;
  document.getElementById('scoreIndicator').textContent = 'SCORE: 0';
  document.getElementById('scoreIndicator').style.opacity = '1';
  document.getElementById('remainIndicator').style.opacity = '1';
  updateRemainIndicator();
  // 在用户交互时初始化音频（浏览器安全策略要求）
  initAudio();
}
